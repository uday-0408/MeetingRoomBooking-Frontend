<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="card-body">
          <h3 class="card-title mb-4">Add New Meeting Room</h3>

          <div *ngIf="successMessage" class="alert alert-success" role="alert">
            {{ successMessage }}
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form [formGroup]="addRoomForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
              <label for="roomName" class="form-label">Room Name</label>
              <input
                id="roomName"
                type="text"
                class="form-control"
                formControlName="roomName"
                [class.is-invalid]="formControls['roomName'].invalid && formControls['roomName'].touched"
              />
              <div class="invalid-feedback" *ngIf="formControls['roomName'].errors?.['required']">
                Room Name is required.
              </div>
            </div>

            <div class="mb-3">
              <label for="capacity" class="form-label">Capacity</label>
              <input
                id="capacity"
                type="number"
                class="form-control"
                formControlName="capacity"
                min="1"
                [class.is-invalid]="formControls['capacity'].invalid && formControls['capacity'].touched"
              />
              <div class="invalid-feedback" *ngIf="formControls['capacity'].errors?.['required']">
                Capacity is required.
              </div>
              <div class="invalid-feedback" *ngIf="formControls['capacity'].errors?.['min']">
                Capacity must be at least 1.
              </div>
            </div>

            <div class="mb-4">
              <label for="location" class="form-label">Location</label>
              <input
                id="location"
                type="text"
                class="form-control"
                formControlName="location"
                [class.is-invalid]="formControls['location'].invalid && formControls['location'].touched"
              />
              <div class="invalid-feedback" *ngIf="formControls['location'].errors?.['required']">
                Location is required.
              </div>
            </div>

            <div class="mb-4">
              <label for="image" class="form-label">Room Image (optional)</label>
              <input
                id="image"
                type="file"
                class="form-control"
                accept="image/*"
                (change)="onImageSelected($event)"
              />
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Creating...' : 'Create Room' }}
              </button>
              <button type="button" class="btn btn-outline-secondary" routerLink="/rooms" [disabled]="isSubmitting">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
