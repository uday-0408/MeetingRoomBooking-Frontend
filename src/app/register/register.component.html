<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card">
        <div class="card-body">
          <h3 class="mb-4">Register</h3>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input
                id="username"
                type="text"
                class="form-control"
                formControlName="username"
                [class.is-invalid]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched"
              />
              <div class="invalid-feedback">Username is required.</div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                id="password"
                type="password"
                class="form-control"
                formControlName="password"
                [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
              />
              <div class="invalid-feedback" *ngIf="registerForm.get('password')?.errors?.['required']">
                Password is required.
              </div>
              <div class="invalid-feedback" *ngIf="registerForm.get('password')?.errors?.['minlength']">
                Password must be at least 6 characters.
              </div>
            </div>

            <div class="mb-3">
              <label for="role" class="form-label">Role</label>
              <select id="role" class="form-select" formControlName="role">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
              </select>
            </div>

            <button class="btn btn-primary w-100" type="submit" [disabled]="submitting">
              {{ submitting ? 'Creating account...' : 'Register' }}
            </button>
          </form>

          <p class="mt-3 mb-0 text-center">
            Already have an account? <a routerLink="/login">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
